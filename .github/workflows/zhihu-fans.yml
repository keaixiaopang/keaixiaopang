name: 自动更新知乎粉丝数

on:
  push:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 安装工具
        run: sudo apt-get install -y curl jq

      - name: 获取粉丝数
        run: |
          ID="ke-ai-xiao-pang-42"
          DATA=$(curl -sL "https://api.rlblog.dev/zhihu/fans?uid=$ID")
          FANS=$(echo $DATA | jq .fans // 1)
          echo "{\"fans\":\"$FANS\"}" > zhihu-fans.json

      - name: 提交更新
        run: |
          git config --global user.name "Auto Update"
          git config --global user.email "actions@github.com"
          git add zhihu-fans.json
          git commit -m "Update zhihu fans" || exit 0
          git push
