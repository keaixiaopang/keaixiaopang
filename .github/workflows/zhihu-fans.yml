name: 自动更新知乎粉丝数

on:
  push:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 获取知乎粉丝数
        run: |
          ID="ke-ai-xiao-pang-42"
          FANS=$(curl -s "https://zhihu-shadow.deno.dev/$ID" | grep -o '"follower_count":[0-9]*' | cut -d: -f2)
          FANS=${FANS:-1}
          echo "{\"fans\":\"$FANS\"}" > zhihu-fans.json

      - name: 提交更新到仓库
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add zhihu-fans.json
          git commit -m "Auto update zhihu fans" || true
          git push
