name: 自动更新知乎粉丝数

on:
  push:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 抓取真实知乎粉丝数
        run: |
          ID="ke-ai-xiao-pang-42"
          FANS=$(curl -sL "https://zhihu-proxy.deno.dev/people/$ID" | sed -n 's/.*"follower_count"\s*:\s*\([0-9]*\).*/\1/p')
          FANS=${FANS:-1}
          echo "当前粉丝数: $FANS"
          echo "{\"fans\":\"$FANS\"}" > zhihu-fans.json

      - name: 提交更新
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add zhihu-fans.json
          git commit -m "Update zhihu fans" || true
          git push
