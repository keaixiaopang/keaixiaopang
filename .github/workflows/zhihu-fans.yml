name: 自动更新知乎粉丝数

on:
  push:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 抓取真实粉丝数
        run: |
          FANS=$(curl -s "https://vx-api.vercel.app/zhihu/user/ke-ai-xiao-pang-42" | jq '.data.follower_count' 2>/dev/null)
          FANS=${FANS:-1}
          echo "粉丝数: $FANS"
          echo "{\"fans\":\"$FANS\"}" > zhihu-fans.json

      - name: 提交更新
        run: |
          git config --global user.name "Auto"
          git config --global user.email "auto@github.com"
          git add zhihu-fans.json
          git commit -m "Update fans" || true
          git push
